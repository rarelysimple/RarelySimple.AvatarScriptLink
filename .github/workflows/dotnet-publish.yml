name: dotnet-publish
run-name: Publish .NET Package by ${{ github.actor }}

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build
    permissions:
      contents: read
    uses: ./.github/workflows/dotnet-build.yml
    with:
      working-directory: ./dotnet
      dotnet-version: '8.0.x'
      test: false
      package: true

  publish-to-github-packages:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dotnet-artifacts
          path: ./artifacts
      
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: '8.0.x'
      
      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate

  publish-to-nuget:
    name: Publish to NuGet.org
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    environment: nuget

    permissions:
      contents: write
      discussions: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: dotnet-artifacts
          path: ./artifacts
      
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: '8.0.x'

      - name: NuGet Login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        id: login
        with:
          user: ${{ secrets.NUGET_USERNAME }}
      
      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./artifacts/RarelySimple.AvatarScriptLink.[0-9]*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY}} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: |
            **/RarelySimple.AvatarScriptLink.[0-9]*.nupkg
            **/LICENSE
          fail_on_unmatched_files: false
          discussion_category_name: Announcements
          generate_release_notes: true
