name: SonarCloud Analysis (.NET)
permissions:
  contents: read
  pull-requests: read
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/dotnet-check-sonarcloud.yml'
      - 'dotnet/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/dotnet-check-sonarcloud.yml'
      - 'dotnet/**'
jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        # actions/setup-java v5 (v5.2.0), pinned to full commit SHA for supply-chain security.
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      # actions/checkout v6 (v6.0.2), pinned to full commit SHA for supply-chain security.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Cache SonarCloud packages
        # actions/cache v5 (v5.0.5), pinned to full commit SHA for supply-chain security.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        # actions/cache v5 (v5.0.5), pinned to full commit SHA for supply-chain security.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
      - name: Sonar begin
        id: sonar-begin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        working-directory: ./dotnet
        run: |
          if (-not $env:SONAR_TOKEN) {
            throw "SONAR_TOKEN is not configured."
          }
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" begin /k:"rarelysimple_RarelySimple.AvatarScriptLink" /o:"rarelysimple" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io"

      - name: Build and test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        working-directory: ./dotnet
        run: |
          dotnet build --configuration release
          dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults/ --configuration release -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover --logger "trx;LogFileName=unittests.trx"

      - name: Sonar end
        if: ${{ always() && steps.sonar-begin.outcome == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        working-directory: ./dotnet
        run: |
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" end /d:sonar.token="$env:SONAR_TOKEN"
